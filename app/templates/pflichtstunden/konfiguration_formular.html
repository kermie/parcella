{% extends "base.html" %}
{% block title %}Konfiguration bearbeiten{% endblock %}
{% block page_title %}Konfiguration {{ konfiguration.jahr }} bearbeiten{% endblock %}

{% block topbar_actions %}
<a href="/pflichtstunden/konfiguration" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Zurück
</a>
{% endblock %}

{% block content %}
<div class="row g-3" style="max-width: 560px;">
    <div class="col-12">
        <div class="card">
            <div class="card-header"><i class="bi bi-pencil me-2"></i>Konfiguration bearbeiten</div>
            <div class="card-body">
                <form method="post" action="/pflichtstunden/konfiguration/{{ konfiguration.id }}/bearbeiten">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Jahr <span class="text-danger">*</span></label>
                        <input type="number" name="jahr" class="form-control"
                               value="{{ konfiguration.jahr }}" min="2000" max="2100" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Pflichtstunden gesamt <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="text" name="stunden_gesamt" class="form-control"
                                   value="{{ konfiguration.stunden_gesamt|int }}" required>
                            <span class="input-group-text">h</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Stundensatz <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="text" name="stundensatz_eur" class="form-control"
                                   value="{{ '%.2f'|format(konfiguration.stundensatz_eur|float) }}" required>
                            <span class="input-group-text">€</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Abrechnungsmodus</label>
                        <select name="modus" class="form-select">
                            <option value="pro_pachtvertrag" {% if konfiguration.modus.value == 'pro_pachtvertrag' %}selected{% endif %}>
                                Pro Pachtvertrag / Parzelle
                            </option>
                            <option value="pro_mitglied" {% if konfiguration.modus.value == 'pro_mitglied' %}selected{% endif %}>
                                Pro Mitglied
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Notiz</label>
                        <input type="text" name="notiz" class="form-control"
                               value="{{ konfiguration.notiz or '' }}">
                    </div>
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="/pflichtstunden/konfiguration" class="btn btn-outline-secondary">Abbrechen</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Änderungen speichern
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
